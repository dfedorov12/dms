<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>DIHAG · DMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<style>
:root {
  --navy:#0a1f3c; --navy2:#1a3a5c; --blue:#0078d4; --blue-bg:#e8f3fc;
  --green:#1a7f3c; --green-bg:#e6f4ea; --red:#c0392b; --red-bg:#fdecea;
  --yellow:#b8860b; --yellow-bg:#fef9e7;
  --border:#e2e8f0; --border2:#c8d4e0; --bg:#f7f9fc; --bg2:#eef2f7;
  --text:#1a2332; --text-muted:#64748b; --text-dim:#94a3b8;
  --shadow:0 4px 16px rgba(10,31,60,.1);
  --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.boot-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.boot-title{font-size:20px;font-weight:700;color:var(--navy);}
.boot-sub{font-size:13px;color:var(--text-muted);}
.boot-err{font-size:12px;color:var(--red);max-width:360px;text-align:center;}
.boot-btn{margin-top:8px;padding:8px 22px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:var(--navy);color:#fff;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;}
.hdr-brand img{height:28px;filter:brightness(0) invert(1);opacity:.9;}
.hdr-divider{width:1px;height:24px;background:rgba(255,255,255,.2);}
.hdr-title{font-size:14px;font-weight:600;opacity:.9;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hdr-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid rgba(255,255,255,.3);}
.hdr-btn{padding:5px 12px;border-radius:6px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.12);}
.hdr-btn.primary{background:var(--blue);border-color:var(--blue);}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1.5px solid var(--border);background:#fff;flex-shrink:0;flex-wrap:wrap;}
.search-box{flex:1;max-width:320px;padding:6px 10px;border:1.5px solid var(--border2);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;}
.search-box:focus{border-color:var(--blue);}
.btn{padding:5px 14px;border-radius:6px;border:1.5px solid var(--border2);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.primary:hover{background:#006cbf;}
.btn.danger{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── MAIN LAYOUT ── */
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:240px;flex-shrink:0;border-right:1.5px solid var(--border);background:#fff;display:flex;flex-direction:column;overflow:hidden;}
.sidebar-hdr{padding:10px 12px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);background:var(--bg2);}
.sidebar-body{flex:1;overflow:auto;}
.site-item{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
.site-item:hover{background:var(--blue-bg);}
.site-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600;}
.site-icon{font-size:14px;flex-shrink:0;}
.lib-item{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 24px;font-size:12px;cursor:pointer;color:var(--text-muted);transition:background .1s;}
.lib-item:hover{background:var(--bg);color:var(--text);}
.lib-item.active{background:var(--bg);color:var(--blue);font-weight:600;}

/* ── FILE AREA ── */
.file-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.breadcrumb{display:flex;align-items:center;gap:4px;padding:8px 14px;font-size:12px;border-bottom:1px solid var(--border);background:#fff;flex-wrap:wrap;flex-shrink:0;}
.bc-seg{cursor:pointer;color:var(--blue);text-decoration:none;}
.bc-seg:hover{text-decoration:underline;}
.bc-sep{color:var(--text-dim);}
.file-toolbar{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap;}
.file-count{font-size:11px;color:var(--text-muted);margin-left:auto;}

/* ── DRAG & DROP ZONE ── */
.drop-zone{position:relative;}
.drop-zone.dragging::after{content:'Dateien hier ablegen';position:absolute;inset:0;background:rgba(0,120,212,.08);border:3px dashed var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--blue);z-index:10;pointer-events:none;}

/* ── FILE TABLE ── */
.file-list{flex:1;overflow:auto;}
.file-table{width:100%;border-collapse:collapse;font-size:12px;}
.file-table th{padding:6px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--text-muted);border-bottom:2px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:1;white-space:nowrap;cursor:pointer;user-select:none;}
.file-table th:hover{color:var(--navy);}
.file-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.file-table tr:hover td{background:var(--blue-bg);}
.file-table tr.selected td{background:#e3f0fb;}
.file-icon{font-size:16px;margin-right:4px;}
.file-name{display:flex;align-items:center;gap:6px;cursor:pointer;}
.file-name a{color:var(--text);text-decoration:none;font-weight:500;}
.file-name a:hover{color:var(--blue);}
.folder-name{color:var(--navy);font-weight:600;cursor:pointer;}
.folder-name:hover{color:var(--blue);}
.file-actions{display:flex;gap:4px;opacity:0;transition:opacity .1s;}
tr:hover .file-actions{opacity:1;}
.fa-btn{padding:2px 7px;border-radius:4px;border:1px solid var(--border2);background:#fff;font-size:10px;cursor:pointer;color:var(--text-muted);}
.fa-btn:hover{border-color:var(--blue);color:var(--blue);}
.fa-btn.danger:hover{border-color:var(--red);color:var(--red);}
.size-badge{font-size:10px;color:var(--text-dim);}
.date-cell{white-space:nowrap;color:var(--text-muted);}

/* ── EMPTY / LOADING ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-dim);gap:8px;padding:40px;}
.empty-icon{font-size:40px;}

/* ── UPLOAD PROGRESS ── */
.upload-bar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 14px;font-size:11px;flex-shrink:0;display:none;}
.upload-inner{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.upload-fill{height:100%;background:var(--blue);width:0;transition:width .2s;border-radius:4px;}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:var(--shadow);min-width:200px;animation:slideIn .2s ease;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:none;opacity:1;}}
.toast.success{background:#e6f4ea;border:1px solid #b7dfbf;color:var(--green);}
.toast.error{background:var(--red-bg);border:1px solid #f5c6c3;color:var(--red);}
.toast.info{background:var(--blue-bg);border:1px solid #b3d4f0;color:var(--blue);}

/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;background:#fff;border:1.5px solid var(--border2);border-radius:8px;box-shadow:var(--shadow);z-index:500;min-width:160px;padding:4px 0;font-size:12px;}
.ctx-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:var(--blue-bg);color:var(--blue);}
.ctx-item.danger:hover{background:var(--red-bg);color:var(--red);}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:800;display:flex;align-items:center;justify-content:center;display:none;}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(10,31,60,.2);width:420px;max-width:95vw;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);}
.modal-body{padding:18px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border);}
.field-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;display:block;}
.field-input{width:100%;padding:7px 10px;border:1.5px solid var(--border2);border-radius:6px;font-size:12px;font-family:var(--font);outline:none;}
.field-input:focus{border-color:var(--blue);}
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-spinner" id="boot-spinner"></div>
  <div class="boot-title">DIHAG · DMS</div>
  <div class="boot-sub" id="boot-sub">Anmeldung läuft…</div>
  <div class="boot-err" id="boot-err" style="display:none;"></div>
  <button class="boot-btn" id="boot-btn" style="display:none;" onclick="doLogin()">Anmelden</button>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh;">
  <header>
    <div class="hdr-brand">
      <span style="font-size:20px;">📄</span>
      <span>DIHAG DMS</span>
    </div>
    <div class="hdr-divider"></div>
    <span class="hdr-title">Dokumentenverwaltung</span>
    <div class="hdr-right">
      <span id="hdr-site-name" style="font-size:11px;color:rgba(255,255,255,.6);"></span>
      <button class="hdr-btn" onclick="refreshCurrentFolder()" title="Aktuellen Ordner neu laden">🔄</button>
      <div class="hdr-av" id="hdr-av">?</div>
    </div>
  </header>

  <div class="toolbar">
    <input class="search-box" id="search-box" placeholder="🔍 Dateien suchen…" oninput="filterFiles()"/>
    <button class="btn primary" onclick="document.getElementById('upload-input').click()">⬆ Hochladen</button>
    <button class="btn" onclick="openNewFolderModal()">📁 Neuer Ordner</button>
    <button class="btn" onclick="openSitePickerModal()">🌐 Site wechseln</button>
    <input type="file" id="upload-input" multiple style="display:none;" onchange="uploadFiles(this.files)"/>
    <span id="toolbar-path" style="font-size:11px;color:var(--text-muted);margin-left:4px;"></span>
  </div>

  <div class="main">
    <!-- LEFT SIDEBAR: Libraries -->
    <div class="sidebar">
      <div class="sidebar-hdr">Bibliotheken</div>
      <div class="sidebar-body" id="lib-list">
        <div class="empty-state" style="padding:20px;font-size:11px;">Site wählen →</div>
      </div>
    </div>

    <!-- RIGHT: File Area -->
    <div class="file-area drop-zone" id="drop-zone">
      <!-- Breadcrumb -->
      <div class="breadcrumb" id="breadcrumb">
        <span style="color:var(--text-dim);">Bibliothek wählen</span>
      </div>

      <!-- File Toolbar -->
      <div class="file-toolbar">
        <button class="btn" onclick="goUp()" id="btn-up" disabled>⬆ Hoch</button>
        <button class="btn" onclick="refreshCurrentFolder()">🔄</button>
        <label style="font-size:11px;color:var(--text-muted);">Ansicht:</label>
        <button class="btn" onclick="toggleView('table')" id="btn-view-table">☰ Liste</button>
        <button class="btn" onclick="toggleView('grid')" id="btn-view-grid">⊞ Kacheln</button>
        <span class="file-count" id="file-count"></span>
      </div>

      <!-- Files -->
      <div class="file-list" id="file-list">
        <div class="empty-state">
          <div class="empty-icon">📁</div>
          <div>Bibliothek in der Seitenleiste wählen</div>
        </div>
      </div>

      <!-- Upload progress -->
      <div class="upload-bar" id="upload-bar">
        <span id="upload-label">Hochladen…</span>
        <div class="upload-inner"><div class="upload-fill" id="upload-fill"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu" style="display:none;"></div>

<!-- New Folder Modal -->
<div class="modal-ov" id="modal-folder">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Neuer Ordner</div>
      <button class="modal-close" onclick="closeModal('modal-folder')">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Ordnername</label>
      <input class="field-input" id="new-folder-name" placeholder="Ordnername eingeben…" onkeydown="if(event.key==='Enter')createFolder()"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-folder')">Abbrechen</button>
      <button class="btn primary" onclick="createFolder()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Site Picker Modal -->
<div class="modal-ov" id="modal-site">
  <div class="modal" style="width:500px;">
    <div class="modal-hdr">
      <div class="modal-title">🌐 SharePoint Site wählen</div>
      <button class="modal-close" onclick="closeModal('modal-site')">✕</button>
    </div>
    <div class="modal-body">
      <input class="field-input" id="site-search-input" placeholder="Site suchen… z.B. IT, Intranet, HR"
        oninput="searchSites(this.value)" style="margin-bottom:10px;"/>
      <div id="site-results" style="max-height:280px;overflow:auto;border:1.5px solid var(--border);border-radius:6px;">
        <div class="empty-state" style="padding:20px;font-size:12px;">Suchbegriff eingeben…</div>
      </div>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div class="modal-ov" id="modal-rename">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Umbenennen</div>
      <button class="modal-close" onclick="closeModal('modal-rename')">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Neuer Name</label>
      <input class="field-input" id="rename-input" onkeydown="if(event.key==='Enter')confirmRename()"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-rename')">Abbrechen</button>
      <button class="btn primary" onclick="confirmRename()">Umbenennen</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG (same Azure AD app as Tickets)
// ════════════════════════════════════════════════════════════════
const CLIENT_ID = '75e627e8-2de0-4ec6-bec9-311757b89e08';
const TENANT_ID = 'fdb70646-023a-403b-a4b9-1f474a935123';
const SCOPES    = ['User.Read','Sites.Read.All','Sites.ReadWrite.All','Files.ReadWrite.All'];
const API       = 'https://graph.microsoft.com/v1.0';

let msalApp, account;

async function initMsal() {
  const redirectUri = window.location.href.split('?')[0].split('#')[0];
  const cfg = {
    auth:{ clientId:CLIENT_ID, authority:`https://login.microsoftonline.com/${TENANT_ID}`, redirectUri },
    cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:true }
  };
  msalApp = new msal.PublicClientApplication(cfg);
  await msalApp.initialize();
  // No handleRedirectPromise() — we use loginPopup, not redirect flow
  const accounts = msalApp.getAllAccounts();
  if (accounts.length) { account = accounts[0]; return true; }
  return false;
}

let currentDriveId = null;
let currentFolderId = null; // null = root
let currentSiteId   = null;
let currentSiteName = '';
let breadcrumbs     = []; // [{id, name}]
let allItems        = []; // current folder items
let viewMode        = 'table';
let sortCol         = 'name';
let sortAsc         = true;
let _renameTarget   = null;
let _siteSearchTimer = null;

// ── HELPERS ──────────────────────────────────────────────────────
const $id = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = s => s ? new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
function fmtSize(b) {
  if (!b) return '';
  if (b < 1024) return b+' B';
  if (b < 1048576) return (b/1024).toFixed(0)+' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}
function fileIcon(name, isFolder) {
  if (isFolder) return '📁';
  const ext = (name||'').split('.').pop().toLowerCase();
  const m = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'🖥️',pptx:'🖥️',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',
    zip:'🗜️',rar:'🗜️',7z:'🗜️',txt:'📋',csv:'📊',msg:'✉️',
    mp4:'🎬',mp3:'🎵',pdf:'📕',html:'🌐',js:'📜',ts:'📜',json:'📜'};
  return m[ext]||'📎';
}
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  $id('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

// ── AUTH ─────────────────────────────────────────────────────────
async function getToken() {
  const req = { scopes:SCOPES, account };
  try { return (await msalApp.acquireTokenSilent(req)).accessToken; }
  catch { return (await msalApp.acquireTokenPopup(req)).accessToken; }
}
async function doLogin() {
  $id('boot-btn').style.display='none';
  $id('boot-sub').textContent='Anmeldung läuft…';
  try {
    const r = await msalApp.loginPopup({scopes:SCOPES});
    account = r.account;
    bootDone();
  } catch(e) {
    $id('boot-err').textContent = e.message;
    $id('boot-err').style.display='block';
    $id('boot-btn').style.display='block';
  }
}
function bootDone() {
  $id('boot').style.display='none';
  $id('app').style.display='flex';
  $id('hdr-av').textContent = (account?.name||'?').split(' ').map(n=>n[0]||'').join('').substring(0,2).toUpperCase();
  // Load default site (IT)
  loadDefaultSite();
}

// ── GRAPH API ────────────────────────────────────────────────────
async function gGet(path, headers={}) {
  const tok = await getToken();
  const r = await fetch(API+path, {headers:{Authorization:'Bearer '+tok,...headers}});
  if (!r.ok) throw new Error(`Graph ${r.status}: ${await r.text().catch(()=>'')}`);
  return r.json();
}
async function gPost(path, body, extraHeaders={}) {
  const tok = await getToken();
  const r = await fetch(API+path, {method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json',...extraHeaders},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`Graph POST ${r.status}: ${await r.text().catch(()=>'')}`);
  return r.json().catch(()=>({}));
}
async function gDelete(path) {
  const tok = await getToken();
  const r = await fetch(API+path, {method:'DELETE',headers:{Authorization:'Bearer '+tok}});
  if (!r.ok && r.status!==204) throw new Error(`Graph DELETE ${r.status}`);
}
async function gPatch(path, body) {
  const tok = await getToken();
  const r = await fetch(API+path, {method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`Graph PATCH ${r.status}`);
  return r.json().catch(()=>({}));
}

// ── BOOT FLOW ────────────────────────────────────────────────────
(async()=>{
  try {
    const loggedIn = await initMsal();
    if (loggedIn) {
      bootDone();
    } else {
      $id('boot-sub').textContent='Bitte anmelden.';
      $id('boot-spinner').style.display='none';
      $id('boot-btn').style.display='block';
    }
  } catch(e) {
    $id('boot-sub').textContent='Anmeldung fehlgeschlagen.';
    $id('boot-err').textContent = e.message;
    $id('boot-err').style.display='block';
    $id('boot-spinner').style.display='none';
    $id('boot-btn').style.display='block';
  }
})();

// ── SITE LOADING ─────────────────────────────────────────────────
async function loadDefaultSite() {
  try {
    // Try to load the IT site as default
    const site = await gGet('/sites/dihag.sharepoint.com:/sites/IT');
    await selectSite(site.id, site.displayName || 'IT');
  } catch {
    // If not accessible, open site picker
    openSitePickerModal();
  }
}

async function selectSite(siteId, name) {
  currentSiteId = siteId;
  currentSiteName = name;
  $id('hdr-site-name').textContent = name;
  currentDriveId = null;
  currentFolderId = null;
  breadcrumbs = [];
  $id('lib-list').innerHTML='<div class="site-item"><span class="site-icon">⏳</span>Lade Bibliotheken…</div>';
  try {
    const d = await gGet(`/sites/${siteId}/drives`);
    const drives = (d.value||[]).filter(dr=>dr.driveType!=='personal');
    $id('lib-list').innerHTML = drives.map(dr=>`
      <div class="lib-item" id="lib-${dr.id}" onclick="selectDrive('${dr.id}','${esc(dr.name)}')">
        📚 ${esc(dr.name)}
      </div>`).join('') || '<div class="empty-state" style="padding:12px;font-size:11px;">Keine Bibliotheken</div>';
  } catch(e) {
    $id('lib-list').innerHTML=`<div class="empty-state" style="padding:12px;font-size:11px;color:var(--red);">Fehler: ${esc(e.message)}</div>`;
  }
}

async function selectDrive(driveId, driveName) {
  currentDriveId = driveId;
  currentFolderId = null;
  breadcrumbs = [{id:null, name: driveName}];
  // Highlight active
  document.querySelectorAll('.lib-item').forEach(el=>el.classList.remove('active'));
  const el = $id('lib-'+driveId);
  if (el) el.classList.add('active');
  await loadFolder(null);
}

// ── FOLDER NAVIGATION ────────────────────────────────────────────
async function loadFolder(folderId) {
  currentFolderId = folderId;
  $id('btn-up').disabled = !folderId;
  showLoading();
  try {
    const path = folderId
      ? `/drives/${currentDriveId}/items/${folderId}/children`
      : `/drives/${currentDriveId}/root/children`;
    let url = path + '?$select=id,name,file,folder,size,lastModifiedDateTime,webUrl,parentReference&$top=200&$orderby=name';
    let items = [];
    while (url) {
      const d = await gGet(url);
      items = [...items, ...(d.value||[])];
      url = d['@odata.nextLink'] ? d['@odata.nextLink'].replace(API,'') : null;
    }
    allItems = items;
    renderFiles();
    updateBreadcrumb();
  } catch(e) {
    $id('file-list').innerHTML=`<div class="empty-state"><div>⚠ Fehler: ${esc(e.message)}</div></div>`;
  }
}

function showLoading() {
  $id('file-list').innerHTML='<div class="empty-state"><div class="boot-spinner" style="width:28px;height:28px;"></div></div>';
}

async function goUp() {
  if (breadcrumbs.length <= 1) return;
  breadcrumbs.pop();
  const prev = breadcrumbs[breadcrumbs.length-1];
  await loadFolder(prev.id);
}

async function openFolder(id, name) {
  breadcrumbs.push({id, name});
  await loadFolder(id);
}

function updateBreadcrumb() {
  const bc = $id('breadcrumb');
  bc.innerHTML = breadcrumbs.map((seg,i)=>{
    if (i === breadcrumbs.length-1) return `<span style="color:var(--text);font-weight:600;">${esc(seg.name)}</span>`;
    return `<span class="bc-seg" onclick="jumpTo(${i})">${esc(seg.name)}</span>`;
  }).join(' <span class="bc-sep">/</span> ');
  $id('toolbar-path').textContent = breadcrumbs.map(s=>s.name).join(' / ');
}

async function jumpTo(idx) {
  breadcrumbs = breadcrumbs.slice(0, idx+1);
  const seg = breadcrumbs[breadcrumbs.length-1];
  await loadFolder(seg.id);
}

// ── RENDERING ────────────────────────────────────────────────────
function filterFiles() {
  renderFiles();
}

function renderFiles() {
  const q = ($id('search-box').value||'').toLowerCase();
  let items = allItems.filter(it => !q || it.name.toLowerCase().includes(q));
  // Sort
  items = items.slice().sort((a,b)=>{
    const fa = !!a.folder, fb = !!b.folder;
    if (fa!==fb) return fa ? -1 : 1; // folders first
    let va, vb;
    if (sortCol==='name') { va=a.name.toLowerCase(); vb=b.name.toLowerCase(); }
    else if (sortCol==='size') { va=a.size||0; vb=b.size||0; }
    else if (sortCol==='date') { va=a.lastModifiedDateTime||''; vb=b.lastModifiedDateTime||''; }
    else { va=a.name.toLowerCase(); vb=b.name.toLowerCase(); }
    return sortAsc ? (va<vb?-1:va>vb?1:0) : (va<vb?1:va>vb?-1:0);
  });

  $id('file-count').textContent = items.length+' Element(e)';

  if (!items.length) {
    $id('file-list').innerHTML='<div class="empty-state"><div class="empty-icon">📂</div><div>Ordner ist leer</div></div>';
    return;
  }

  if (viewMode==='grid') { renderGrid(items); return; }

  const rows = items.map(it=>{
    const isFolder = !!it.folder;
    const icon = fileIcon(it.name, isFolder);
    const name = isFolder
      ? `<span class="folder-name" onclick="openFolder('${it.id}','${esc(it.name)}')">${icon} ${esc(it.name)}</span>`
      : `<span class="file-name">${icon} <a href="${esc(it.webUrl||'#')}" target="_blank">${esc(it.name)}</a></span>`;
    const size = it.file ? `<span class="size-badge">${fmtSize(it.size)}</span>` : '';
    return `<tr oncontextmenu="showCtxMenu(event,'${it.id}','${esc(it.name)}',${isFolder})">
      <td>${name}</td>
      <td>${size}</td>
      <td class="date-cell">${fmt(it.lastModifiedDateTime)}</td>
      <td><div class="file-actions">
        ${it.webUrl ? `<button class="fa-btn" onclick="window.open('${esc(it.webUrl)}','_blank')">↗ Öffnen</button>` : ''}
        ${it.file ? `<button class="fa-btn" onclick="downloadFile('${it.id}','${esc(it.name)}')">⬇</button>` : ''}
        <button class="fa-btn" onclick="openRename('${it.id}','${esc(it.name)}')">✏</button>
        <button class="fa-btn danger" onclick="deleteItem('${it.id}','${esc(it.name)}',${isFolder})">🗑</button>
      </div></td>
    </tr>`;
  }).join('');

  $id('file-list').innerHTML = `<table class="file-table">
    <thead><tr>
      <th onclick="setSort('name')">Name ${sortSym('name')}</th>
      <th onclick="setSort('size')" style="width:90px;">Größe ${sortSym('size')}</th>
      <th onclick="setSort('date')" style="width:140px;">Geändert ${sortSym('date')}</th>
      <th style="width:180px;"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderGrid(items) {
  const html = items.map(it=>{
    const isFolder = !!it.folder;
    const icon = fileIcon(it.name, isFolder);
    const click = isFolder ? `openFolder('${it.id}','${esc(it.name)}')` : `window.open('${esc(it.webUrl||'#')}','_blank')`;
    return `<div style="width:120px;text-align:center;padding:12px 8px;cursor:pointer;border-radius:8px;border:1.5px solid var(--border);background:#fff;"
      onclick="${click}" oncontextmenu="showCtxMenu(event,'${it.id}','${esc(it.name)}',${isFolder})">
      <div style="font-size:32px;margin-bottom:6px;">${icon}</div>
      <div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;">${esc(it.name)}</div>
      ${it.file ? `<div style="font-size:10px;color:var(--text-dim);">${fmtSize(it.size)}</div>` : ''}
    </div>`;
  }).join('');
  $id('file-list').innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:12px;padding:16px;">${html}</div>`;
}

function setSort(col) {
  if (sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }
  renderFiles();
}
function sortSym(col) {
  if (sortCol!==col) return '';
  return sortAsc ? '▲' : '▼';
}
function toggleView(mode) {
  viewMode = mode;
  renderFiles();
}

// ── UPLOAD ───────────────────────────────────────────────────────
async function uploadFiles(fileList) {
  if (!fileList || !fileList.length || !currentDriveId) return;
  const files = Array.from(fileList);
  const bar = $id('upload-bar');
  const fill = $id('upload-fill');
  const label = $id('upload-label');
  bar.style.display='block';
  let done=0;
  for (const file of files) {
    label.textContent = `Hochladen: ${file.name} (${done+1}/${files.length})`;
    try {
      const parentId = currentFolderId || 'root';
      const path = currentFolderId
        ? `/drives/${currentDriveId}/items/${currentFolderId}:/${encodeURIComponent(file.name)}:/content`
        : `/drives/${currentDriveId}/root:/${encodeURIComponent(file.name)}:/content`;
      const tok = await getToken();
      const r = await fetch(API+path, {method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':file.type||'application/octet-stream'},body:file});
      if (!r.ok) throw new Error('HTTP '+r.status);
      done++;
      fill.style.width = ((done/files.length)*100)+'%';
    } catch(e) {
      toast('Fehler bei '+file.name+': '+e.message,'error');
    }
  }
  bar.style.display='none';
  fill.style.width='0';
  $id('upload-input').value='';
  toast(`✓ ${done}/${files.length} Datei(en) hochgeladen`,'success');
  await loadFolder(currentFolderId);
}

// ── DRAG & DROP ──────────────────────────────────────────────────
const dropZone = $id('drop-zone');
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', e=>{ if(!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('dragging'); });
dropZone.addEventListener('drop', e=>{
  e.preventDefault();
  dropZone.classList.remove('dragging');
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});

// ── FOLDER CREATE ────────────────────────────────────────────────
function openNewFolderModal() {
  if (!currentDriveId) { toast('Bitte zuerst eine Bibliothek wählen','info'); return; }
  $id('new-folder-name').value='';
  $id('modal-folder').classList.add('open');
  setTimeout(()=>$id('new-folder-name').focus(),100);
}

async function createFolder() {
  const name = $id('new-folder-name').value.trim();
  if (!name) return;
  closeModal('modal-folder');
  try {
    const parentId = currentFolderId || 'root';
    const path = currentFolderId
      ? `/drives/${currentDriveId}/items/${currentFolderId}/children`
      : `/drives/${currentDriveId}/root/children`;
    await gPost(path, {name, folder:{}, '@microsoft.graph.conflictBehavior':'rename'});
    toast('Ordner erstellt ✓','success');
    await loadFolder(currentFolderId);
  } catch(e) { toast('Fehler: '+e.message,'error'); }
}

// ── DELETE ───────────────────────────────────────────────────────
async function deleteItem(id, name, isFolder) {
  const what = isFolder ? 'Ordner' : 'Datei';
  if (!confirm(`${what} "${name}" wirklich löschen?`)) return;
  try {
    await gDelete(`/drives/${currentDriveId}/items/${id}`);
    toast(`${what} gelöscht ✓`,'success');
    allItems = allItems.filter(it=>it.id!==id);
    renderFiles();
  } catch(e) { toast('Fehler: '+e.message,'error'); }
}

// ── RENAME ───────────────────────────────────────────────────────
function openRename(id, name) {
  _renameTarget = {id, name};
  $id('rename-input').value = name;
  $id('modal-rename').classList.add('open');
  setTimeout(()=>$id('rename-input').focus(),100);
}

async function confirmRename() {
  const newName = $id('rename-input').value.trim();
  if (!newName || !_renameTarget) return;
  closeModal('modal-rename');
  try {
    const updated = await gPatch(`/drives/${currentDriveId}/items/${_renameTarget.id}`, {name: newName});
    const idx = allItems.findIndex(it=>it.id===_renameTarget.id);
    if (idx>=0) { allItems[idx].name = newName; }
    renderFiles();
    toast('Umbenannt ✓','success');
  } catch(e) { toast('Fehler: '+e.message,'error'); }
  _renameTarget=null;
}

// ── DOWNLOAD ─────────────────────────────────────────────────────
async function downloadFile(id, name) {
  try {
    const tok = await getToken();
    const r = await fetch(`${API}/drives/${currentDriveId}/items/${id}/content`, {headers:{Authorization:'Bearer '+tok}});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { toast('Download-Fehler: '+e.message,'error'); }
}

// ── CONTEXT MENU ─────────────────────────────────────────────────
function showCtxMenu(e, id, name, isFolder) {
  e.preventDefault();
  const menu = $id('ctx-menu');
  menu.innerHTML = [
    isFolder ? `<div class="ctx-item" onclick="openFolder('${id}','${name}');hideCtxMenu()">📂 Öffnen</div>` : '',
    !isFolder ? `<div class="ctx-item" onclick="downloadFile('${id}','${name}');hideCtxMenu()">⬇ Herunterladen</div>` : '',
    !isFolder ? `<div class="ctx-item" onclick="window.open(allItems.find(i=>i.id==='${id}')?.webUrl,'_blank');hideCtxMenu()">↗ In SharePoint öffnen</div>` : '',
    '<div class="ctx-sep"></div>',
    `<div class="ctx-item" onclick="openRename('${id}','${name}');hideCtxMenu()">✏ Umbenennen</div>`,
    `<div class="ctx-item danger" onclick="deleteItem('${id}','${name}',${isFolder});hideCtxMenu()">🗑 Löschen</div>`,
  ].join('');
  menu.style.display='block';
  menu.style.left = Math.min(e.clientX, window.innerWidth-180)+'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight-180)+'px';
}
function hideCtxMenu() { $id('ctx-menu').style.display='none'; }
document.addEventListener('click', hideCtxMenu);

// ── REFRESH ──────────────────────────────────────────────────────
async function refreshCurrentFolder() {
  if (!currentDriveId) return;
  await loadFolder(currentFolderId);
}

// ── SITE PICKER ──────────────────────────────────────────────────
function openSitePickerModal() {
  $id('modal-site').classList.add('open');
  $id('site-search-input').value='';
  $id('site-results').innerHTML='<div class="empty-state" style="padding:20px;font-size:12px;">Suchbegriff eingeben…</div>';
  setTimeout(()=>$id('site-search-input').focus(),100);
}

async function searchSites(q) {
  clearTimeout(_siteSearchTimer);
  if (!q || q.length<2) return;
  _siteSearchTimer = setTimeout(async()=>{
    $id('site-results').innerHTML='<div class="empty-state" style="padding:16px;font-size:12px;">Suche…</div>';
    try {
      const d = await gGet(`/sites?search=${encodeURIComponent(q)}&$top=12&$select=id,displayName,webUrl`);
      const sites = d.value||[];
      if (!sites.length) {
        $id('site-results').innerHTML='<div class="empty-state" style="padding:16px;font-size:12px;">Keine Sites gefunden</div>';
        return;
      }
      $id('site-results').innerHTML = sites.map(s=>`
        <div class="site-item" onclick="pickSite('${esc(s.id)}','${esc(s.displayName||'')}')">
          <span class="site-icon">🌐</span>
          <div>
            <div style="font-weight:600;">${esc(s.displayName||'')}</div>
            <div style="font-size:10px;color:var(--text-dim);">${esc(s.webUrl||'')}</div>
          </div>
        </div>`).join('');
    } catch(e) {
      $id('site-results').innerHTML=`<div class="empty-state" style="padding:12px;font-size:11px;color:var(--red);">Fehler: ${esc(e.message)}</div>`;
    }
  }, 350);
}

async function pickSite(id, name) {
  closeModal('modal-site');
  await selectSite(id, name);
}

// ── MODAL ────────────────────────────────────────────────────────
function closeModal(id) { $id(id).classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-ov').forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); });
});
</script>
